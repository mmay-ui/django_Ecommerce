{% extends 'shop/base.html' %}

{% block title %}User Profile{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Welcome to Your Profile, {{ user.username }}!</h1>
    
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">User Information</h5>
            <p class="card-text"><strong>Username:</strong> {{ user.username }}</p>
            <p class="card-text"><strong>Email:</strong> {{ user.email }}</p>
            
            
            
            <a href="{% url 'order_history' %}" class="btn btn-primary mt-3">View Order History</a>
            
            <a href="{% url 'homepage' %}" class="btn btn-secondary mt-3">Back to Home</a>
            
            <a href="{% url 'logout' %}" class="btn btn-danger mt-3">Logout</a>
        </div>
    </div>
</div>
{% endblock %}
